###########################################
############ Hyprland Config ##############
### https://github.com/c0mpile/dotfiles ###
###########################################

source = ~/.config/hypr/colors.conf

################
### MONITORS ###
################

monitor=,highres@hifreq,auto,auto # automatically run all monitors at highest supported resolution and refresh rate


############
### APPS ###
############

$terminal = kitty
$fileManager = kitty -e yazi 
$menu = rofi
$browser = firefox-developer-edition

#################
### AUTOSTART ###
#################

exec-once = hyprpanel > ~/.config/hyprpanel/logs.txt 2>&1
exec-once = hypridle
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1 
exec-once = waypaper-engine daemon --format 
exec-once = rm $XDG_RUNTIME_DIR/swww.socket
#exec-once = nm-applet
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP


#############################
### ENVIRONMENT VARIABLES ###
#############################

env = XDG_CURRENT_DESKTOP, Hyprland
env = XDG_SESSION_TYPE, wayland
env = XDG_SESSION_DESKTOP, Hyprland
env = QT_QPA_PLATFORM, wayland
env = QT_QPA_PLATFORMTHEME, qt5ct
env = ELECTRON_ARGS="--enable-features=UseOzonePlatform --ozone-platform=wayland"
env = MOZ_DBUS_REMOTE=1
env = QT_WAYLAND_DISABLE_WINDOWDECORATION=1

# cursor settings
env = HYPRCURSOR_THEME,Vimix-cursor-white-hyprcursor
env = HYPRCURSOR_SIZE,24
env = XCURSOR_THEME,Vimix-cursor-white
env = XCURSOR_SIZE,24


########################
### BORDERS AND GAPS ###
########################

general {
    gaps_in = 5
    gaps_out = 10
    border_size = 1 
    col.active_border = 0xff$surface_bright
    col.inactive_border = 0xff$surface
    resize_on_border = true 
    allow_tearing = false
    layout = dwindle
}


##########################
### WINDOW DECORATIONS ###
##########################

decoration {
    rounding = 5

    active_opacity = 1.0
    inactive_opacity = 1.0

    shadow {
        enabled = true
        range = 4
        render_power = 3
        color = rgba(1a1a1aee)
    }

    blur {
        enabled = false 
        size = 3
        passes = 1

        vibrancy = 0.1696
    }
}


###################
### ANIMATIONS ####
###################

animations {
    enabled = yes, please :)

    bezier = easeOutQuint,0.23,1,0.32,1
    bezier = easeInOutCubic,0.65,0.05,0.36,1
    bezier = linear,0,0,1,1
    bezier = almostLinear,0.5,0.5,0.75,1.0
    bezier = quick,0.15,0,0.1,1

    animation = global, 1, 10, default
    animation = border, 1, 5.39, easeOutQuint
    animation = windows, 1, 4.79, easeOutQuint
    animation = windowsIn, 1, 4.1, easeOutQuint, popin 87%
    animation = windowsOut, 1, 1.49, linear, popin 87%
    animation = fadeIn, 1, 1.73, almostLinear
    animation = fadeOut, 1, 1.46, almostLinear
    animation = fade, 1, 3.03, quick
    animation = layers, 1, 3.81, easeOutQuint
    animation = layersIn, 1, 4, easeOutQuint, fade
    animation = layersOut, 1, 1.5, linear, fade
    animation = fadeLayersIn, 1, 1.79, almostLinear
    animation = fadeLayersOut, 1, 1.39, almostLinear
    animation = workspaces, 1, 1.94, almostLinear, fade
    animation = workspacesIn, 1, 1.21, almostLinear, fade
    animation = workspacesOut, 1, 1.94, almostLinear, fade
}


###############
### LAYOUTS ###
###############

dwindle {
    pseudotile = true
    preserve_split = true
}

master {
    new_status = master
}

#####################
### DEFAULT LOGOS ###
#####################

#disable anime wallpaper
misc {
    force_default_wallpaper = -1
    disable_hyprland_logo = false
}


#############
### INPUT ###
#############

# keyboard and mouse input
input {
    kb_layout = us
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =
    follow_mouse = 1 # focus follows mouse
    sensitivity = 0 # mouse sensitivity

# laptop touchpad settings
    touchpad {
        natural_scroll = false
    }
}

# touch gestures
gestures {
    workspace_swipe = false
}


###################
### KEYBINDINGS ###
###################

$mainMod = SUPER # Windows key

# launch apps
bind = $mainMod, Return, exec, $terminal
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, D, exec, pkill -9 rofi || rofi -show drun -theme $HOME/.config/rofi/launcher.rasi
bind = $mainMod SHIFT, W, exec, $browser
bind = $mainMod, Q, killactive,
bind = $mainMod SHIFT, M, exit,
bind = $mainMod SHIFT, L, exec, hyprlock 

#bind = $mainMod, W, exec, $HOME/.config/hypr/scripts/wallpaper.sh
bind = $mainMod, Y, exec, waypaper-engine random

bind = $mainMod, Space, togglefloating,
bind = $mainMod, P, pseudo,
bind = $mainMod, J, togglesplit,

# change focused window with arrow keys
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# switch workspaces
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# move window to workspace
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# scratchpad
bind = $mainMod SHIFT, S, togglespecialworkspace, magic
bind = $mainMod ALT, S, movetoworkspace, special:magic

# scroll workspaces with mousewheel
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# move/resize windows with LMB/RMB respectively
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# multimedia keys
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl s 10%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl s 10%-

bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

##############################
### WINDOWS AND WORKSPACES ###
##############################

windowrulev2 = suppressevent maximize, class:.* # ignore maximize requests from apps
#windowrulev2 = nofocus,class:^$,title:^$,xwayland:1,floating:1,fullscreen:0,pinned:0 # fix XWayland window dragging issues
